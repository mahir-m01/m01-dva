  # About
  about:
    enable: true
    title: "About Me"
    image: "/images/me.jpg"
    content: |-
      I'm a Computer Science & Artificial Intelligence student at **Newton School of Technology, Rishihood University** (CGPA 9.4 / 10.0), specialising in Data & Visual Analytics.

      I build end-to-end analytical pipelines: from raw, multi-thousand-column survey datasets to published Tableau dashboards and deployed ML systems. My work spans agricultural food security analysis across 35 countries, Steam marketplace market-structure research, and solar energy forecasting with an agentic AI layer over 3.8 million rows of European grid data.

      I care about making analysis reproducible, insights defensible, and dashboards genuinely useful to decision-makers.
    skills:
      enable: true
      title: "Core toolkit:"
      items:
        - "Python"
        - "SQL"
        - "Pandas / NumPy"
        - "Statsmodels"
        - "scikit-learn"
        - "Supervised Learning"
        - "Feature Engineering"
        - "Model Evaluation"
        - "LangGraph"
        - "LangChain"
        - "RAG"
        - "Agentic AI Pipelines"
        - "Tableau (Public)"
        - "Matplotlib / Seaborn / Plotly"
        - "Google Sheets"
        - "ETL Pipeline Design"
        - "EDA / ETA"
        - "Statistical Hypothesis Testing"
        - "KPI Design & Dashboard Design"
        - "Jupyter Notebooks"
        - "Git / GitHub"
        - "Hugging Face Spaces"

