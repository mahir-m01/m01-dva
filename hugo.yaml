  # Projects
  projects:
    enable: true
    items:
      - title: "RHoMIS Food Security Analytics"
        content: |-
          Analysis of **54,873 smallholder farm households** across 35 countries using the Harvard Dataverse RHoMIS dataset. Built a 5-stage ETL pipeline reducing 1,599 raw variables to 46 Tableau-ready features.

          Applied logistic regression, Mann-Whitney U, chi-square, and k-means clustering to quantify food insecurity drivers. Published a 4-view interactive Tableau dashboard on Tableau Public.
        image: /images/projects/rhomis-banner.jpg
        featured:
          name: "Read More"
          link: /projects/rhomis-food-security/
        badges:
          - "Python"
          - "Pandas"
          - "Matplotlib"
          - "Seaborn"
          - "Tableau"
          - "scikit-learn"
          - "k-means"
          - "ETL"
          - "EDA"
          - "Statistical Testing"
        links:
          - icon: fab fa-github
            url: https://github.com/mahir-m01/Section-C_G-7_RHoMIS-Analytics
          - icon: fas fa-chart-bar
            url: https://public.tableau.com/app/profile/rajdeep.sanyal/viz/RHoMISDASHBOARD/INCOMEPOSITION

      - title: "Steam Games Market Analytics"
        content: |-
          Market structure analysis of **~7,000 Steam titles** to identify engagement drivers and pricing dynamics. Engineered KPIs including Weighted Sentiment Score, Discount Impact, and Popularity Tier segmentation.

          Key finding: Free-to-Play titles generate **5.7x higher average Peak CCU** than Paid. Built an interactive Google Sheets dashboard with 15+ pivot tables and dynamic slicers.
        image: /images/projects/steam-banner.jpg
        featured:
          name: "Read More"
          link: /projects/steam-games-analytics/
        badges:
          - "Google Sheets"
          - "KPI Design"
          - "Pivot Tables"
          - "EDA"
          - "Dashboard Design"
          - "Market Analysis"
        links:
          - icon: fab fa-github
            url: https://github.com/mahir-m01/SectionC_Group2_SteamGames

      - title: "SolarIntel: Solar Energy Generation Prediction"
        content: |-
          End-to-end ML system forecasting hourly solar output across **29 European countries** using 3.8 million rows fused from EMHIRES and NASA POWER API data.

          Random Forest achieves R² of 0.911. Built a 4-node LangGraph agentic pipeline with RAG for grid-management recommendations. Deployed on Hugging Face Spaces.
        image: /images/projects/nasa-banner.jpg
        featured:
          name: "Read More"
          link: /projects/solarintel/
        badges:
          - "Python"
          - "scikit-learn"
          - "Matplotlib"
          - "Seaborn"
          - "Plotly"
          - "LangGraph"
          - "LangChain"
          - "RAG"
          - "NASA POWER API"
          - "EMHIRES"
        links:
          - icon: fab fa-github
            url: https://github.com/mahir-m01/EMHIRES-NASA-SolarPrediction
          - icon: fas fa-external-link-alt
            url: https://huggingface.co/spaces/priyanshutomar2024/SolarIntel

