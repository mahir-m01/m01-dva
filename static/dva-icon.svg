<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <rect width="64" height="64" rx="12" fill="#0d1117"/>
  <!-- bar chart: 3 bars -->
  <rect x="8"  y="32" width="12" height="20" rx="2" fill="#4fc3f7"/>
  <rect x="26" y="18" width="12" height="34" rx="2" fill="#4fc3f7" opacity="0.85"/>
  <rect x="44" y="10" width="12" height="42" rx="2" fill="#4fc3f7" opacity="0.65"/>
  <!-- trend line across tops -->
  <polyline points="14,32 32,18 50,10" stroke="#81d4fa" stroke-width="2.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- dot at each bar top -->
  <circle cx="14" cy="32" r="2.5" fill="#e1f5fe"/>
  <circle cx="32" cy="18" r="2.5" fill="#e1f5fe"/>
  <circle cx="50" cy="10" r="2.5" fill="#e1f5fe"/>
</svg>
